<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResumeLens | See Your Resume Like a Recruiter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'brand-primary': '#0284c7',
              'brand-secondary': '#0e7490',
            }
          }
        }
      }
    </script>
    <style>
      /* ── Score ring animation ─────────────────────────────── */
      @property --ring-pct {
        syntax: '<percentage>';
        inherits: false;
        initial-value: 0%;
      }
      @keyframes ring-fill {
        from { --ring-pct: 0%; }
        to   { --ring-pct: var(--target-pct, 0%); }
      }
      .score-ring {
        border-radius: 50%;
        background: conic-gradient(
          var(--ring-color, #22d3ee) var(--ring-pct),
          rgba(255,255,255,0.06) var(--ring-pct)
        );
        animation: ring-fill 1.4s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .score-ring-inner {
        border-radius: 50%;
        background: #0b1628;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      /* ── Shimmer button ───────────────────────────────────── */
      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      .btn-shimmer {
        background-size: 200% auto;
        transition: background-position 0s;
      }
      .btn-shimmer:hover {
        background-image: linear-gradient(
          90deg,
          #0891b2 0%,
          #22d3ee 40%,
          #a5f3fc 50%,
          #22d3ee 60%,
          #0891b2 100%
        );
        background-size: 200% auto;
        animation: shimmer 1.6s linear infinite;
      }

      /* ── Metrics glow (PASS) ──────────────────────────────── */
      .metrics-pass-glow {
        box-shadow: 0 0 24px rgba(52, 211, 153, 0.25), 0 0 6px rgba(52, 211, 153, 0.15);
      }

      /* ── Subtle gradient background ──────────────────────── */
      body {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 55%, #042f2e 100%);
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
